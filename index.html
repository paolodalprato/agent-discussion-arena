/* ============ CSS RESET & BASE ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-primary: #F8F7F4;
  --bg-secondary: #F0EFEC;
  --bg-card: #FFFFFF;
  --bg-input: #FFFFFF;
  --border-color: #E8E5DF;
  --text-primary: #000000;
  --text-secondary: #666666;
  --text-muted: #999999;
  --accent: #E84D35;
  --accent-bg: rgba(232,77,53,0.06);
  --accent-border: rgba(232,77,53,0.20);
  --p1-color: #E84D35;
  --p1-bg: transparent;
  --p1-border: #E84D35;
  --p2-color: #000000;
  --p2-bg: transparent;
  --p2-border: #000000;
  --p3-color: #888888;
  --p3-bg: transparent;
  --p3-border: #888888;
  --p4-color: #C47A20;
  --p4-bg: transparent;
  --p4-border: #C47A20;
  --moderator-color: #E84D35;
  --moderator-bg: transparent;
  --moderator-border: #E84D35;
  --font-body: 'DM Sans', system-ui, sans-serif;
  --font-mono: 'DM Mono', monospace;
  --radius: 4px;
  --max-width: 680px;
}

body {
  font-family: var(--font-body);
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.65;
  min-height: 100vh;
}

/* ============ ANIMATIONS ============ */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
  40% { opacity: 1; transform: scale(1); }
}
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

.fade-up { animation: fadeUp 0.4s ease forwards; }

.loading-dots { display: inline-flex; gap: 5px; align-items: center; padding: 16px 0; }
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--text-muted);
  animation: pulse 1.4s infinite;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

.shimmer-bar {
  height: 2px; border-radius: 1px;
  background: linear-gradient(90deg, var(--border-color) 25%, var(--accent) 50%, var(--border-color) 75%);
  background-size: 200% 100%;
  animation: shimmer 2s linear infinite;
}

/* ============ LAYOUT ============ */
.container {
  max-width: var(--max-width);
  margin: 0 auto;
  padding: 24px 20px 80px;
}

/* ============ TYPOGRAPHY ============ */
h1, h2, h3 { font-weight: 700; letter-spacing: -0.03em; }
h1 { font-size: 2.4rem; }
h2 { font-size: 1.15rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.06em; font-weight: 500; font-size: 0.8rem; }
h3 { font-size: 0.95rem; }
code, .mono { font-family: var(--font-mono); font-size: 0.85em; }

/* ============ FORM ELEMENTS ============ */
input, textarea, select {
  width: 100%;
  background: var(--bg-input);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 0.88rem;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}
input:focus, textarea:focus, select:focus {
  border-color: var(--text-primary);
}
textarea { resize: vertical; min-height: 60px; }
select { cursor: pointer; }
label { font-size: 0.78rem; color: var(--text-secondary); margin-bottom: 4px; display: block; text-transform: uppercase; letter-spacing: 0.04em; }

/* ============ BUTTONS ============ */
button {
  font-family: var(--font-body);
  font-size: 0.88rem;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  padding: 10px 20px;
  transition: all 0.15s;
}
.btn-primary {
  background: var(--text-primary);
  color: var(--bg-primary);
  font-weight: 700;
}
.btn-primary:hover:not(:disabled) { opacity: 0.8; }
.btn-primary:disabled { opacity: 0.25; cursor: not-allowed; }
.btn-secondary {
  background: transparent;
  color: var(--text-primary);
  border: 1px solid var(--border-color);
}
.btn-secondary:hover { border-color: var(--text-primary); }
.btn-small { padding: 6px 14px; font-size: 0.78rem; }
.btn-danger { background: transparent; color: #d45b5b; border: 1px solid rgba(212,91,91,0.3); }
.btn-danger:hover { background: rgba(212,91,91,0.06); }

/* ============ CARDS ============ */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
}

.section { margin-bottom: 40px; }
.section-header {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border-color);
}
.section-number {
  background: var(--text-primary);
  color: var(--bg-primary);
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-mono);
  font-size: 0.72rem; font-weight: 700;
}

/* ============ PARTICIPANT CARD ============ */
.participant-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid var(--border-color);
  border-left: 3px solid var(--border-color);
}

/* ============ DEBATE VIEW ============ */
.phase-header {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 12px;
}
.badge {
  font-family: var(--font-mono);
  font-size: 0.65rem;
  padding: 2px 8px;
  border-radius: var(--radius);
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-parallel { background: #F5F5F5; color: var(--text-secondary); }
.badge-sequential { background: #F5F5F5; color: var(--text-secondary); }

.response-card {
  background: var(--bg-card);
  border: 1px solid var(--border-color);
  border-left: 3px solid var(--border-color);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 10px;
  animation: fadeUp 0.4s ease forwards;
}
.response-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 8px; font-weight: 700;
  font-size: 0.82rem;
}
.color-dot {
  width: 8px; height: 8px;
  border-radius: 50%; flex-shrink: 0;
}
.response-text { font-size: 0.88rem; line-height: 1.7; color: #333; }
.response-text h1 { font-size: 1.1rem; font-weight: 700; margin: 12px 0 6px; color: var(--text-primary); }
.response-text h2 { font-size: 1rem; font-weight: 700; margin: 10px 0 4px; color: var(--text-primary); }
.response-text h3 { font-size: 0.92rem; font-weight: 600; margin: 8px 0 4px; color: var(--text-primary); }
.response-text p { margin: 0 0 8px; }
.response-text p:last-child { margin-bottom: 0; }
.response-text ul, .response-text ol { margin: 4px 0 8px 20px; }
.response-text li { margin-bottom: 2px; }
.response-text strong { font-weight: 700; color: var(--text-primary); }
.response-text em { font-style: italic; }
.response-text blockquote {
  border-left: none;
  padding-left: 0; margin: 8px 0;
  color: inherit; font-style: normal;
}
.response-text code { font-family: var(--font-mono); font-size: 0.82rem; background: var(--bg-secondary); padding: 1px 4px; border-radius: 2px; }

/* ============ TOKEN COUNTER ============ */
.token-bar {
  display: flex; gap: 16px; flex-wrap: wrap;
  border-top: 1px solid var(--border-color);
  border-bottom: 1px solid var(--border-color);
  padding: 10px 0;
  font-family: var(--font-mono);
  font-size: 0.72rem;
  color: var(--text-muted);
  margin-bottom: 24px;
}
.token-bar span { white-space: nowrap; }
.token-bar strong { color: var(--text-primary); }

/* ============ SUMMARY PANEL ============ */
.summary-panel {
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 24px;
  margin-top: 32px;
}
.summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.summary-item { text-align: center; }
.summary-value { font-family: var(--font-mono); font-size: 1.4rem; color: var(--text-primary); font-weight: 700; }
.summary-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }

/* ============ LANGUAGE TOGGLE ============ */
.lang-toggle {
  position: fixed; top: 16px; right: 16px; z-index: 100;
  background: var(--bg-primary);
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 3px;
  display: flex; gap: 2px;
}
.lang-btn {
  padding: 3px 10px; border-radius: 2px;
  font-size: 0.72rem; font-weight: 700;
  background: transparent; color: var(--text-muted);
  cursor: pointer; border: none;
  font-family: var(--font-mono);
}
.lang-btn.active { background: var(--text-primary); color: var(--bg-primary); }

/* ============ DEMO BANNER ============ */
.demo-banner {
  border: 1px solid var(--border-color);
  border-radius: var(--radius);
  padding: 20px 24px;
  margin-bottom: 32px;
  text-align: center;
}
.demo-banner p { color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 14px; }
.demo-banner .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

/* ============ WARNING ============ */
.warning-box {
  border: 1px solid rgba(232,77,53,0.25);
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-bottom: 20px;
  font-size: 0.85rem;
  color: var(--accent);
}

/* ============ MISC ============ */
.flex-row { display: flex; gap: 10px; align-items: center; }
.flex-between { display: flex; justify-content: space-between; align-items: center; }
.gap-8 { gap: 8px; }
.gap-12 { gap: 12px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.mt-24 { margin-top: 24px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.text-center { text-align: center; }
.text-muted { color: var(--text-muted); }
.text-secondary { color: var(--text-secondary); }
.text-gold { color: var(--accent); }
.text-sm { font-size: 0.82rem; }
.text-xs { font-size: 0.72rem; }
.grow { flex: 1; }
.hidden { display: none; }

.password-wrapper { position: relative; }
.password-wrapper input { padding-right: 44px; }
.password-toggle {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: none; border: none; color: var(--text-muted); cursor: pointer;
  font-size: 0.82rem; padding: 4px 8px;
}

.slider-container { display: flex; align-items: center; gap: 12px; }
.slider-container input[type="range"] {
  -webkit-appearance: none; appearance: none;
  height: 2px; background: var(--border-color);
  border-radius: 1px; border: none; padding: 0; flex: 1;
}
.slider-container input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none; appearance: none;
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--text-primary); cursor: pointer;
}
.slider-value {
  font-family: var(--font-mono);
  font-size: 1rem; font-weight: 700;
  color: var(--text-primary); min-width: 24px; text-align: center;
}

.status-indicator {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: var(--font-mono); font-size: 0.78rem;
}
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
}
.status-dot.ok { background: #2D9D5C; }
.status-dot.fail { background: #d45b5b; }
.status-dot.pending { background: var(--text-muted); }

.credits {
  text-align: center; padding: 40px 0 16px;
  font-size: 0.75rem; color: var(--text-muted);
}
.credits a { color: var(--text-primary); text-decoration: none; }
.credits a:hover { text-decoration: underline; }

@media (max-width: 600px) {
  h1 { font-size: 1.8rem; }
  .summary-grid { grid-template-columns: 1fr; }
}

// ============ FILE READER ============
const TEXT_EXTENSIONS = ['txt', 'md', 'csv', 'json', 'xml', 'html', 'log', 'tsv'];
const IMAGE_TYPES = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];

// Try server-side PDF extraction via pymupdf4llm (if available)
async function tryServerPdfExtraction(file) {
  try {
    const arrayBuf = await file.arrayBuffer();
    const resp = await fetch('/api/extract-pdf', {
      method: 'POST',
      headers: { 'Content-Type': 'application/pdf' },
      body: arrayBuf,
    });
    if (!resp.ok) return null;
    const data = await resp.json();
    if (data.error) return null;
    return {
      name: file.name,
      type: 'text',
      mimeType: 'application/pdf',
      content: data.text,
      extractionMethod: 'pymupdf4llm',
    };
  } catch {
    return null;
  }
}

async function readUploadedFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  const isImage = IMAGE_TYPES.includes(file.type);
  const isPdf = ext === 'pdf' || file.type === 'application/pdf';
  const isText = TEXT_EXTENSIONS.includes(ext) || file.type.startsWith('text/');

  if (isImage) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve({
        name: file.name,
        type: 'image',
        mimeType: file.type,
        content: reader.result,
        extractionMethod: 'browser',
      });
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  if (isPdf) {
    // Try enhanced server-side extraction first
    const serverResult = await tryServerPdfExtraction(file);
    if (serverResult) return serverResult;
    // Fallback to browser-side pdfjs
    const arrayBuf = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
    let text = '';
    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      text += content.items.map(item => item.str).join(' ') + '\n\n';
    }
    return { name: file.name, type: 'text', mimeType: 'application/pdf', content: text.trim(), extractionMethod: 'pdfjs' };
  }

  if (isText) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve({
        name: file.name,
        type: 'text',
        mimeType: file.type || 'text/plain',
        content: reader.result,
        extractionMethod: 'browser',
      });
      reader.onerror = reject;
      reader.readAsText(file);
    });
  }

  throw new Error('UNSUPPORTED');
}

// ============ DEBATE SETUP ============
function DebateSetup({ setup, setSetup, attachedDoc, setAttachedDoc, lang }) {
  const t = T[lang];

  const updateParticipant = (index, field, value) => {
    const p = [...setup.participants];
    p[index] = { ...p[index], [field]: value };
    setSetup({ ...setup, participants: p });
  };

  const addParticipant = () => {
    if (setup.participants.length < 4) {
      setSetup({ ...setup, participants: [...setup.participants, { name: '', perspective: '', communicationStyle: '' }] });
    }
  };

  const removeParticipant = (index) => {
    if (setup.participants.length > 2) {
      setSetup({ ...setup, participants: setup.participants.filter((_, i) => i !== index) });
    }
  };

  return (
    <div className="section">
      <div className="section-header">
        <div className="section-number">2</div>
        <h2>{t.debateSetup}</h2>
      </div>

      <div className="card mb-16">
        <label>{t.topic}</label>
        <textarea
          value={setup.topic}
          onChange={e => setSetup({ ...setup, topic: e.target.value })}
          placeholder={t.topicPlaceholder}
          rows={2}
        />
        <div style={{ marginTop: '12px' }}>
          {!attachedDoc ? (
            <div>
              <label className="btn-secondary btn-small" style={{ cursor: 'pointer', display: 'inline-block' }}>
                + {t.attachDocument}
                <input type="file" accept=".txt,.md,.csv,.json,.xml,.html,.log,.tsv,.pdf,.jpg,.jpeg,.png,.gif,.webp" style={{ display: 'none' }}
                  onChange={async (e) => {
                    const file = e.target.files?.[0];
                    if (!file) return;
                    try {
                      const doc = await readUploadedFile(file);
                      setAttachedDoc(doc);
                    } catch (err) {
                      alert('Unsupported file type');
                    }
                    e.target.value = '';
                  }}
                />
              </label>
              <span className="text-muted text-xs" style={{ marginLeft: '8px' }}>{t.attachDocumentDesc}</span>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: '4px' }}>
              <div className="flex-row gap-8" style={{ alignItems: 'center' }}>
                <span className="text-xs">{t.documentAttached}: <strong>{attachedDoc.name}</strong> ({attachedDoc.type === 'image' ? 'image' : `${(attachedDoc.content.length / 1024).toFixed(0)} KB ${t.extractedTextSize}`})</span>
                <button className="btn-secondary btn-small" onClick={() => setAttachedDoc(null)}>{t.removeDocument}</button>
              </div>
              {attachedDoc.extractionMethod && (attachedDoc.extractionMethod === 'pymupdf4llm' || attachedDoc.extractionMethod === 'pdfjs') && (
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                  <span className="text-muted text-xs" style={{ fontStyle: 'italic' }}>
                    {attachedDoc.extractionMethod === 'pymupdf4llm' ? t.pymupdfNote : attachedDoc.extractionMethod === 'pdfjs' ? t.pdfjsNote : ''}
                  </span>
                  <a href="#" className="text-xs" style={{ color: 'var(--accent)' }}
                    onClick={(e) => {
                      e.preventDefault();
                      const ext = attachedDoc.extractionMethod === 'pymupdf4llm' ? '.md' : '.txt';
                      const blob = new Blob([attachedDoc.content], { type: 'text/plain;charset=utf-8' });
                      const url = URL.createObjectURL(blob);
                      const a = document.createElement('a');
                      a.href = url;
                      a.download = attachedDoc.name.replace(/\.pdf$/i, ext);
                      a.click();
                      URL.revokeObjectURL(url);
                    }}
                  >{t.downloadExtractedText}</a>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      <h3 className="mb-8" style={{ color: 'var(--accent)' }}>{t.moderator}</h3>
      <div className="participant-card mb-16" style={{ borderLeftColor: 'var(--moderator-color)' }}>

// ============ DOWNLOAD DISCUSSION ============
function downloadDiscussion(setup, phases, tokens, totalTime, totalCalls, config, attachedDoc, t) {
  const topic = setup?.topic || 'discussion';
  const lines = [];
  lines.push(`# ${topic}\n`);
  const providerLabel = config?.provider === 'openai-compatible' ? `OpenAI-Compatible (${config?.baseUrl || ''})` : (config?.provider || 'unknown');
  lines.push(`*Generated with Agent Discussion Arena — ai-know.pro*`);
  lines.push(`*Provider: ${providerLabel} | Model: ${config?.model || 'unknown'}*\n`);

  // Participants summary
  const participants = setup?.participants || [];
  if (participants.length) {
    lines.push(`## Participants\n`);
    participants.forEach(p => {
      lines.push(`- **${p.name}** — ${p.perspective}`);
    });
    lines.push('');
  }
  if (setup?.moderator) {
    lines.push(`**Moderator:** ${setup.moderator.name} — ${setup.moderator.perspective}\n`);
  }
  if (attachedDoc) {
    lines.push(`**Reference document:** ${attachedDoc.name} (${attachedDoc.type})\n`);
  }

  lines.push('---\n');

  // Phases
  phases.forEach(phase => {
    const label = phase.name;
    lines.push(`## ${label}\n`);
    phase.responses.forEach((resp, ri) => {
      if (ri % 2 === 1) {
        // Indent odd responses as blockquotes for visual staggering
        lines.push(`> ### ${resp.name}\n>`);
        lines.push((resp.text || '').split('\n').map(l => `> ${l}`).join('\n'));
        lines.push('');
      } else {
        lines.push(`### ${resp.name}\n`);
        lines.push(resp.text || '');
        lines.push('');
      }
    });
  });

  // Stats
  lines.push('---\n');
  lines.push(`## Stats\n`);
  lines.push(`- Provider: ${providerLabel}`);
  lines.push(`- Model: ${config?.model || 'unknown'}`);
  lines.push(`- API Calls: ${totalCalls}`);
  lines.push(`- Phases: ${phases.length}`);
  lines.push(`- Input tokens: ${tokens.input.toLocaleString()}`);
  lines.push(`- Output tokens: ${tokens.output.toLocaleString()}`);
  lines.push(`- Total tokens: ${(tokens.input + tokens.output).toLocaleString()}`);
  lines.push(`- Time: ${totalTime.toFixed(1)}s`);

  const blob = new Blob([lines.join('\n')], { type: 'text/markdown;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const slug = topic.toLowerCase().replace(/[^a-z0-9]+/g, '-').slice(0, 40);
  const a = document.createElement('a');
  a.href = url;
  a.download = `discussion-${slug}.md`;
  a.click();
  URL.revokeObjectURL(url);
}

    if (name === (setup?.moderator?.name || DEMO_DATA.moderator.name)) return MOD_STYLE;
    const participants = setup?.participants || DEMO_DATA.participants;
    const idx = participants.findIndex(p => p.name === name);
    return COLORS[idx] || COLORS[0];
  };

  const isComplete = status === 'complete';
  const allPhases = phases || [];
  const pCount = (setup?.participants || DEMO_DATA.participants).length;
  const rounds = setup?.rounds || DEMO_DATA.rounds;
  // intro(1) + openings(pCount parallel) + rounds(pCount sequential each) + verdict(1)
  const totalCalls = 1 + pCount + (pCount * rounds) + 1;
  const parallelPhaseCount = 1 + rounds; // opening + rounds

  return (
    <div>
      <h2 className="text-center mb-8">{t.debateOn}:</h2>
      <p className="text-center mb-16" style={{ fontSize: '1.1rem', fontStyle: 'italic' }}>
        "{setup?.topic || DEMO_DATA.topic}"
      </p>

      {!isComplete && (
        <div className="mb-16">
          <div className="shimmer-bar" />
          <p className="text-center text-sm text-muted mt-8">
            {status === 'verdict' ? t.statusVerdict : t.statusRunning}
          </p>
        </div>
      )}

      <div className="token-bar">
        <span>{t.inputTokens}: <strong>{tokens.input.toLocaleString()}</strong></span>
        <span>{t.outputTokens}: <strong>{tokens.output.toLocaleString()}</strong></span>
        <span>{t.totalTokens}: <strong>{(tokens.input + tokens.output).toLocaleString()}</strong></span>
      </div>

      {allPhases.map((phase, pi) => {
        const phaseLabel = phase.name.startsWith("Round") ? `${t.round} ${phase.name.split(" ")[1]}` :
                           phase.name === "Opening Statements" ? t.opening :
                           phase.name === "Verdict" ? t.verdict : phase.name;
        return (
          <div key={pi} className="fade-up mb-16">
            <div className="phase-header">
              <h3>{phaseLabel}</h3>
              {phase.time != null && (
                <span className="mono text-muted text-xs">{phase.time.toFixed(1)}{t.seconds}</span>
              )}
            </div>
            {phase.responses.map((resp, ri) => {
              const style = getParticipantStyle(resp.name);
              const indent = ri % 2 === 1 ? '48px' : '0';
              return (
                <div key={ri} className="response-card" style={{ borderLeft: `3px solid ${style.color}`, marginLeft: indent }}>
                  <div className="response-header">
                    <span className="color-dot" style={{ background: style.color }} />
                    <span style={{ color: style.color }}>{resp.name}</span>
                  </div>
                  <div className="response-text" dangerouslySetInnerHTML={{ __html: (typeof marked !== 'undefined' && marked.parse) ? marked.parse(resp.text || '') : (resp.text || '') }} />
                </div>
              );
            })}
          </div>
        );
      })}

      {/* Loading cards for in-progress phase */}
      {!isComplete && currentPhaseIndex != null && !allPhases[currentPhaseIndex || 0] && (
        <div className="card" style={{ textAlign: 'center' }}>
          <LoadingDots />
        </div>
      )}

      {isComplete && (
        <div className="summary-panel fade-up">
          <h3 className="text-center text-gold mb-16">{t.summaryTitle}</h3>
          <div className="summary-grid">
            <div className="summary-item">
              <div className="summary-value">{totalCalls}</div>
              <div className="summary-label">{t.totalCalls}</div>
            </div>
            <div className="summary-item">
              <div className="summary-value">{allPhases.length}</div>
              <div className="summary-label">{t.totalPhases}</div>
            </div>
            <div className="summary-item">
              <div className="summary-value">{totalTime.toFixed(1)}{t.seconds}</div>
              <div className="summary-label">{t.totalTime}</div>
            </div>
          </div>
          <div className="text-center" style={{ marginTop: '16px' }}>
            <button className="btn-secondary btn-small" onClick={() => downloadDiscussion(setup, allPhases, tokens, totalTime, totalCalls, config, attachedDoc, t)}>
              ↓ {t.downloadDiscussion}
            </button>
          </div>
        </div>
      )}

      <div ref={endRef} />
    </div>
  );
}

// ============ MAIN APP ============
function App() {
  const [lang, setLang] = useState('en');
  const [view, setView] = useState('setup'); // setup | debate
  const [proxyOk, setProxyOk] = useState(null);
  const isDemo = isDemoMode();

  // Provider config
  const [config, setConfig] = useState({
    provider: 'anthropic',
    apiKey: '',
    model: '',
    baseUrl: '',
  });

  // Debate setup
  const [setup, setSetup] = useState({
    topic: '',
    participants: [
      { name: '', perspective: '', communicationStyle: '' },
      { name: '', perspective: '', communicationStyle: '' },
    ],
    moderator: { name: '', perspective: '', communicationStyle: '' },
    rounds: 2,
  });

  // Attached document: { name, type, content (text or base64), mimeType }
  const [attachedDoc, setAttachedDoc] = useState(null);

  // Debate state
  const [phases, setPhases] = useState([]);
  const [currentPhaseIndex, setCurrentPhaseIndex] = useState(null);
  const [debateStatus, setDebateStatus] = useState('idle');
  const [tokens, setTokens] = useState({ input: 0, output: 0 });
  const [totalTime, setTotalTime] = useState(0);

  const t = T[lang];

  // Check proxy on mount (live mode only)
  useEffect(() => {
    if (!isDemo) {
      fetch(`${PROXY_BASE}/api/health`)
        .then(r => r.json())
        .then(d => setProxyOk(d.status === 'ok'))
        .catch(() => setProxyOk(false));
    }
  }, []);

  // ============ BUILD PROMPTS ============
  const buildSystemPrompt = (name, perspective, role, topic, communicationStyle) => {
    const langInst = `MANDATORY LANGUAGE RULE (applies to your ENTIRE response, including conclusions and summaries): You MUST write in the SAME LANGUAGE as the discussion topic below. The topic is: "${topic}". Detect its language and use that language for every single sentence you write. Do NOT switch to English or any other language at any point.`;
    const factuality = "- FACTUALITY: Do not fabricate citations, case law, statistics, studies, names of institutions, or any specific reference. Do NOT reference external information, experiences, or data that are not in the provided document or research sources — if you cannot ground a claim in the materials provided, do not make it. When a reference document is provided, ground your arguments in its actual content — cite specific articles, sections, or passages from it.";
    // Include attached text document in system prompt context
    let docContext = '';
    if (attachedDoc && attachedDoc.type === 'text') {
      docContext = `\n\n--- REFERENCE DOCUMENT (${attachedDoc.name}) ---\n${attachedDoc.content}\n--- END DOCUMENT ---\n\n- Use the reference document above as context for your arguments. Cite specific parts when relevant.`;
    } else if (attachedDoc && attachedDoc.type === 'image') {
      docContext = `\n\n- An image document (${attachedDoc.name}) has been provided as context. It will be included in the conversation. Refer to its content in your arguments when relevant.`;
    }
    const styleRules = `WRITING STYLE:
- Write in a natural, conversational tone — as you would in a real professional discussion.
- Do NOT format your entire response as bullet lists. Use flowing prose with occasional emphasis (bold for key terms only).
- You may use a short list (2-3 items) only when enumerating concrete actions or requirements.
- Do NOT end with a "Conclusion" or "In summary" section. Your last paragraph should be your final substantive point, not a recap.
- Be consistent in formatting across rounds.`;

    if (role === 'moderator') {
      return `${langInst}\n\nYou are ${name}. ${perspective}\nYou are the moderator of this structured multi-perspective discussion on:\n"${topic}"${docContext}\n\nYOUR COMMUNICATION STYLE: ${communicationStyle || 'Authoritative and structured, willing to take a clear position'}\nThis defines HOW you moderate — your tone, degree of directness, willingness to take a position vs staying neutral, formality level. Stay consistent with this style.\n\nYour task:\n1. Evaluate argument EVOLUTION: did participants develop their thinking across rounds, or did they repeat themselves?\n2. Evaluate ENGAGEMENT: did they address each other's specific points?\n3. Identify the single strongest argument and the single weakest across all participants.\n4. Note any logical fallacies, unsupported claims, or missed opportunities.\n5. Deliver a clear verdict on which perspective was more convincing and why. Avoid diplomatic "both are right" conclusions unless truly justified by the evidence.\n6. Identify at least one argument that NO participant made but SHOULD have — a gap in the discussion that a competent professional would notice. Explain why this missing argument matters.\n- Maximum 400 words\n${factuality}\n${styleRules}`;
    }
    return `${langInst}\n\nYou are ${name}. ${perspective}\nYou are participating in a structured multi-perspective discussion on:\n"${topic}"${docContext}\n\nYOUR COMMUNICATION STYLE: ${communicationStyle || 'Professional and direct'}\nThis defines HOW you argue — sentence length, level of assertiveness, use of rhetorical questions, tendency to qualify statements, degree of formality, emotional register. It does NOT change your position or your arguments, only your voice. Stay consistent with this style throughout the entire discussion.\n\nCRITICAL RULES:\n- You MUST directly address at least one specific argument made by another participant. Quote or paraphrase their point, then respond to it.\n- Do NOT repeat your own previous arguments. If you already made a point in an earlier round, refer to it briefly and build upon it with new reasoning or evidence.\n- Identify where you agree or disagree with others and explain why.\n- Be intellectually honest: concede valid points, but do NOT default to agreement. Challenge assumptions, identify gaps, and push back when you see weaknesses — even if the other participant's point has merit. A productive discussion needs tension.\n- When you concede a point, be SPECIFIC: name the exact argument you are conceding, explain WHY it is valid, then immediately clarify what this concession does NOT affect in your overall position. A specific concession strengthens your credibility. A vague "I agree but..." wastes words.\n- Structure: 1 point of response to others + 1-2 new or evolved arguments.\n- Maximum 300 words.\n${factuality}\n${styleRules}`;
  };

  // Build messages with optional image attachment for the first user message
  const buildMessages = (messages) => {
    if (!attachedDoc || attachedDoc.type !== 'image') return messages;
    // Only attach image to the first message of the conversation
    const first = messages[0];
    if (!first || first.role !== 'user') return messages;
    // Extract base64 data from data URL
    const base64 = attachedDoc.content.split(',')[1];
    const mediaType = attachedDoc.mimeType;
    if (config.provider === 'anthropic') {
      return [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: mediaType, data: base64 } },
          { type: 'text', text: first.content },
        ],
      }, ...messages.slice(1)];
    }
    // OpenAI / OpenAI-compatible format
    return [{
      role: 'user',
      content: [
        { type: 'image_url', image_url: { url: attachedDoc.content } },
        { type: 'text', text: first.content },
      ],
    }, ...messages.slice(1)];
  };

  const callAPI = async (systemPrompt, messages) => {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 1200000); // 20 minutes
    let res;
    try {
      res = await fetch(`${PROXY_BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        signal: controller.signal,
        body: JSON.stringify({
          provider: config.provider,
          api_key: config.apiKey,
          model: config.model,
          system: systemPrompt,
          messages: buildMessages(messages),
          ...(config.provider === 'openai-compatible' ? { base_url: config.baseUrl } : {}),
        }),
      });
    } catch (e) {
      clearTimeout(timeoutId);
      if (e.name === 'AbortError') throw new Error('Request timed out (20 min). Try a smaller model or shorter prompt.');
      throw e;
    }
    clearTimeout(timeoutId);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    return data;
  };

  // ============ BUILD CUMULATIVE TRANSCRIPT ============
  const buildTranscript = (phases) => {
    return phases.map(phase => {
      const header = `--- ${phase.name} ---`;
      const body = phase.responses.map(r => `${r.name}:\n${r.text}`).join('\n\n');
      return `${header}\n\n${body}`;
    }).join('\n\n');
  };

  // ============ INFER COMMUNICATION STYLES ============
  const inferCommunicationStyles = async () => {
    const needsInference = setup.participants.some(p => !p.communicationStyle?.trim()) || !setup.moderator.communicationStyle?.trim();
    if (!needsInference) return setup;

    const participantsToInfer = setup.participants.map((p, i) => ({
      index: i,
      name: p.name,
      perspective: p.perspective,
      needsStyle: !p.communicationStyle?.trim(),
    }));

    const prompt = `Given this discussion setup, infer communication styles for the roles that need one.

Topic: "${setup.topic}"

Moderator: ${setup.moderator.name} — ${setup.moderator.perspective}
${!setup.moderator.communicationStyle?.trim() ? 'NEEDS STYLE' : 'Style: ' + setup.moderator.communicationStyle}

Participants:
${participantsToInfer.map(p => `- ${p.name}: ${p.perspective} ${p.needsStyle ? '— NEEDS STYLE' : '— Style: ' + setup.participants[p.index].communicationStyle}`).join('\n')}

For each role marked NEEDS STYLE, infer a communication style (5-15 words) that captures HOW they would argue — their tone, assertiveness, formality, emotional register. Derive it from the role and context, not stereotypes.

Respond ONLY with a JSON object, no markdown, no backticks:
{"moderator": "style or null if not needed", "participants": ["style or null for each, in order"]}`;

    try {
      const result = await callAPI('You are a helpful assistant. Respond only with valid JSON, no markdown formatting.', [{ role: 'user', content: prompt }]);
      const text = result.text.replace(/```json|```/g, '').trim();
      const styles = JSON.parse(text);

      const updatedSetup = { ...setup };
      if (styles.moderator && !setup.moderator.communicationStyle?.trim()) {
        updatedSetup.moderator = { ...updatedSetup.moderator, communicationStyle: styles.moderator };
      }
      if (styles.participants) {
        updatedSetup.participants = setup.participants.map((p, i) => {
          if (!p.communicationStyle?.trim() && styles.participants[i]) {
            return { ...p, communicationStyle: styles.participants[i] };
          }
          return p;
        });
      }
      setSetup(updatedSetup);
      return updatedSetup;
    } catch (e) {
      console.warn('Style inference failed, proceeding with defaults:', e);
      return setup;
    }
  };

  // ============ RUN LIVE DEBATE ============
  const runLiveDebate = async () => {
    setView('debate');
    setPhases([]);
    setTokens({ input: 0, output: 0 });
    setTotalTime(0);
    setDebateStatus('running');
    const startTime = performance.now();
    let cumTokens = { input: 0, output: 0 };
    const allPhases = [];

    // Infer missing communication styles before starting
    const enrichedSetup = await inferCommunicationStyles();

    const addTokens = (usage) => {
      cumTokens = {
        input: cumTokens.input + (usage?.input_tokens || 0),
        output: cumTokens.output + (usage?.output_tokens || 0),
      };
      setTokens({ ...cumTokens });
    };

    try {
      // Phase 0: Moderator introduction (sequential)
      const introStart = performance.now();
      setCurrentPhaseIndex(0);

      // Extract a neutral topic summary programmatically — take only the first 2 sentences
      // This avoids passing parties' positions, legal theories, or arguments to the moderator
      const topicSentences = enrichedSetup.topic.match(/[^.!?]+[.!?]+/g) || [enrichedSetup.topic];
      const neutralTopic = topicSentences.slice(0, 2).join(' ').trim();

      const langInst = `MANDATORY: You MUST write your ENTIRE response in the SAME LANGUAGE as this text: "${enrichedSetup.topic.substring(0, 80)}". If this text is in Italian, you write in Italian. If in English, you write in English. Do NOT switch languages.`;
      const modIntroSys = `${langInst}\n\nYou are ${enrichedSetup.moderator.name}. ${enrichedSetup.moderator.perspective}\nYou are the moderator of a structured multi-perspective discussion.`;
      const introResult = await callAPI(modIntroSys, [{
        role: 'user',
        content: `The situation to discuss is:\n${neutralTopic}\n\nWrite a brief introduction that explains this situation in simple, accessible language. Describe what happened and what is at stake.\n\nDo NOT name or introduce the participants — they will introduce themselves.\nDo NOT mention specific laws, articles, or technical theories.\n\nKeep it concise (max 100 words).`,
      }]);
      addTokens(introResult.usage);
      const introPhase = {
        name: t.introTitle || "Introduction",
        type: "sequential",
        time: (performance.now() - introStart) / 1000,
        responses: [{ name: enrichedSetup.moderator.name, text: introResult.text }],
      };
      allPhases.push(introPhase);
      setPhases([...allPhases]);

      // Phase 1: Opening statements (parallel — no context needed)
      const phaseStart = performance.now();
      setCurrentPhaseIndex(allPhases.length);
      const openingPromises = enrichedSetup.participants.map(p => {
        const sys = buildSystemPrompt(p.name, p.perspective, 'participant', enrichedSetup.topic, p.communicationStyle);
        return callAPI(sys, [{ role: 'user', content: `Present your opening statement on: "${enrichedSetup.topic}"\n\nIMPORTANT: Present your STRONGEST single argument and your core position. Do NOT try to cover everything — you will have multiple rounds to develop your reasoning. Save your supporting arguments, counter-objections, and nuances for later rounds. A focused opening is more powerful than an exhaustive one.` }]);
      });
      const openingResults = await Promise.all(openingPromises);
      const openingPhase = {
        name: t.openingTitle || "Opening Statements",
        type: "parallel",
        time: (performance.now() - phaseStart) / 1000,
        responses: openingResults.map((r, i) => {
          addTokens(r.usage);
          return { name: enrichedSetup.participants[i].name, text: r.text };
        }),
      };
      allPhases.push(openingPhase);
      setPhases([...allPhases]);

      // Phase 2..N: Discussion rounds (sequential within each round)
      // Each participant receives the full cumulative transcript before responding
      for (let round = 1; round <= enrichedSetup.rounds; round++) {
        const roundStart = performance.now();
        setCurrentPhaseIndex(allPhases.length);
        const roundResponses = [];

        for (let pi = 0; pi < enrichedSetup.participants.length; pi++) {
          const p = enrichedSetup.participants[pi];
          const sys = buildSystemPrompt(p.name, p.perspective, 'participant', enrichedSetup.topic, p.communicationStyle);

          // Build cumulative transcript: all previous phases + responses so far in this round
          let transcript = buildTranscript(allPhases);
          if (roundResponses.length > 0) {
            const currentRoundText = roundResponses.map(r => `${r.name}:\n${r.text}`).join('\n\n');
            transcript += `\n\n--- Round ${round} (in progress) ---\n\n${currentRoundText}`;
          }

          const userMsg = `Here is the full discussion so far:\n\n${transcript}\n\nIt is now Round ${round}. Read the previous arguments carefully.\n\nBEFORE WRITING: Identify the single most important NEW insight you want to introduce in this round — something that has not been said yet by anyone, including yourself. Build your response around that new point. If you find yourself restating something from a previous round, stop and find a different angle.\n\nYou MUST:\n1. Pick the strongest or most problematic argument from another participant and respond to it specifically (agree, counter, or refine).\n2. Do NOT restate points you already made — evolve your position with new reasoning or evidence.\n3. If you find yourself agreeing with the other side on a point, say so openly — but be specific about what you concede and what you do not.\nRespond now from your perspective.`;
          const result = await callAPI(sys, [{ role: 'user', content: userMsg }]);
          addTokens(result.usage);
          roundResponses.push({ name: p.name, text: result.text });

          // Update UI progressively: show responses as they come in
          const inProgressPhase = {
            name: `Round ${round}`,
            type: "sequential",
            time: (performance.now() - roundStart) / 1000,
            responses: [...roundResponses],
          };
          setPhases([...allPhases, inProgressPhase]);
        }

        const roundPhase = {
          name: `Round ${round}`,
          type: "sequential",
          time: (performance.now() - roundStart) / 1000,
          responses: roundResponses,
        };
        allPhases.push(roundPhase);
        setPhases([...allPhases]);
      }

      // Final phase: Verdict (moderator reads everything)
      setDebateStatus('verdict');
      const verdictStart = performance.now();
      setCurrentPhaseIndex(allPhases.length);

      const fullTranscript = buildTranscript(allPhases);
      const modSys = buildSystemPrompt(enrichedSetup.moderator.name, enrichedSetup.moderator.perspective, 'moderator', enrichedSetup.topic, enrichedSetup.moderator.communicationStyle);
      const verdictResult = await callAPI(modSys, [{
        role: 'user',
        content: `Here is the complete discussion transcript:\n\n${fullTranscript}\n\nDeliver your verdict and analysis. Remember: you must also identify at least one argument that NO participant made but SHOULD have — a gap in the discussion that a competent professional would notice.`,
      }]);
      addTokens(verdictResult.usage);

      const verdictPhase = {
        name: t.verdictTitle || "Verdict",
        type: "sequential",
        time: (performance.now() - verdictStart) / 1000,
        responses: [{ name: enrichedSetup.moderator.name, text: verdictResult.text }],
      };
      allPhases.push(verdictPhase);
      setPhases([...allPhases]);

    } catch (err) {
      allPhases.push({
        name: "Error",
        type: "sequential",
        time: 0,
        responses: [{ name: "System", text: `Error: ${err.message}` }],
      });
      setPhases([...allPhases]);
    }

    setTotalTime((performance.now() - startTime) / 1000);
    setDebateStatus('complete');
  };

  // ============ RUN DEMO ============
  const runDemo = async () => {
    setView('debate');
    setPhases([]);
    setTokens({ input: 0, output: 0 });
    setTotalTime(0);
    setDebateStatus('running');
    const startTime = performance.now();
    let cumTokens = { input: 0, output: 0 };

    for (let pi = 0; pi < DEMO_DATA.phases.length; pi++) {
      const phase = DEMO_DATA.phases[pi];
      setCurrentPhaseIndex(pi);

      if (phase.name === "Verdict") setDebateStatus('verdict');

      // Simulate delay
      await new Promise(r => setTimeout(r, 2000 + Math.random() * 1500));

      // Simulate token counts
      phase.responses.forEach(resp => {
        const words = resp.text.split(/\s+/).length;
        cumTokens = {
          input: cumTokens.input + Math.round(words * 1.8),
          output: cumTokens.output + Math.round(words * 1.3),
        };
      });
      setTokens({ ...cumTokens });
      setPhases(prev => [...prev, phase]);
    }

    setTotalTime((performance.now() - startTime) / 1000);
    setDebateStatus('complete');
  };

  const resetDebate = () => {
    setView('setup');
    setPhases([]);
    setDebateStatus('idle');
    setTokens({ input: 0, output: 0 });
    setTotalTime(0);
    setCurrentPhaseIndex(null);
  };

  // ============ RENDER ============
  return (
    <div>
      <LanguageToggle lang={lang} setLang={setLang} />
      <div className="container">
        <header className="text-center" style={{ margin: '40px 0 32px' }}>
          <h1>{t.title}</h1>
          <p className="text-secondary" style={{ fontStyle: 'italic' }}>{t.subtitle}</p>
        </header>

        {/* DEMO MODE */}
        {isDemo && view === 'setup' && (
          <div className="demo-banner fade-up">
            <p>{t.demoBannerText}</p>
            <div className="btn-row">
              <button className="btn-primary" onClick={runDemo}>{t.playDemo}</button>
              <a href={GITHUB_URL} target="_blank" rel="noopener noreferrer">
                <button className="btn-secondary">{t.viewOnGithub}</button>
              </a>
            </div>
          </div>
        )}

        {/* LIVE MODE SETUP */}
        {!isDemo && view === 'setup' && (
          <div>
            {proxyOk === false && (
              <div className="warning-box">
                <span className="status-indicator"><span className="status-dot fail" /></span>
                {' '}{t.proxyWarning}
              </div>
            )}
            <ProviderConfig config={config} setConfig={setConfig} lang={lang} />
            <DebateSetup setup={setup} setSetup={setSetup} attachedDoc={attachedDoc} setAttachedDoc={setAttachedDoc} lang={lang} />
            <LaunchSection setup={setup} config={config} onStart={runLiveDebate} lang={lang} />
          </div>
        )}

        {/* DEBATE VIEW */}
        {view === 'debate' && (
          <div>
            <DebateView
              phases={phases}
              currentPhaseIndex={currentPhaseIndex}
              status={debateStatus}
              tokens={tokens}
              totalTime={totalTime}
              setup={isDemo ? { topic: DEMO_DATA.topic, participants: DEMO_DATA.participants, moderator: DEMO_DATA.moderator, rounds: DEMO_DATA.rounds } : setup}
              config={config}
              attachedDoc={attachedDoc}
              lang={lang}
              isDemo={isDemo}
            />
            {debateStatus === 'complete' && (
              <div className="text-center mt-24">
                <button className="btn-primary" onClick={resetDebate}>
                  {isDemo ? t.playDemo : t.newDebate}
                </button>
              </div>
            )}
          </div>
        )}

        <footer className="credits">
          {t.version} — {t.credits} <a href="https://ai-know.pro" target="_blank" rel="noopener noreferrer">Paolo Dalprato</a> {t.creditsAnd} <a href="https://claude.ai" target="_blank" rel="noopener noreferrer">Claude</a> — <a href={GITHUB_URL} target="_blank" rel="noopener noreferrer">GitHub</a>
        </footer>
      </div>
    </div>
  );
}

// ============ RENDER ============
ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
